<!DOCTYPE html>
<html lang="en">
<head>
  <title>Tally Counter Demo</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="authbar">
    <button id="loginBtn" hidden>Sign in with GitHub</button>
    <span id="userBox" hidden>
      <img id="avatar" alt="" width="28" height="28" />
      <span id="userName"></span>
      <button id="logoutBtn" class="link">Sign out</button>
    </span>
  </header>

  <main>
    <div id="number">0</div>
    <div id="timestamp">&nbsp;</div>
    <div id="controls">
      <button id="countBtn" disabled>Count</button>
      <button id="newBatchBtn" disabled>New Batch</button>
      <button id="archiveBtn" disabled>Archive</button>
      <button id="clearBtn" disabled>Clear</button>
    </div>
    <div id="status">&nbsp;</div>
    <div id="history"></div>
  </main>

  <script type="module" src="tally.js"></script>
</body>
</html>
