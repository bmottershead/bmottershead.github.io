name: Email archive confirmation

# Demo CI: whenever the committer-proxy Worker commits a user's archive
# (data/<login>/timestamps.json, on "Archive" or "Clear"), send a confirmation
# email summarizing what was archived — via the Resend API.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   RESEND_API_KEY  a Resend API key (https://resend.com, send-only is fine)
#   NOTIFY_EMAIL    where to send the confirmation
# Optional:
#   MAIL_FROM       verified sender address. Defaults to onboarding@resend.dev,
#                   which Resend lets you use without verifying a domain — but
#                   only delivers to your own Resend account email. To send
#                   elsewhere, verify a domain and set MAIL_FROM to an address on it.
#
# Note: the Worker stamps commits with a GitHub noreply author email, so the
# recipient is a configured address rather than the end user. Fine for a demo.

on:
  push:
    branches: [main]
    paths:
      - "data/**/timestamps.json"

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the parent commit to diff against

      - name: Summarize the archive that changed
        id: sum
        run: |
          file=$(git diff --name-only HEAD^ HEAD -- 'data/**/timestamps.json' | head -1)
          if [ -z "$file" ] || [ ! -f "$file" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No archive file in this push — skipping."
            exit 0
          fi
          by=$(jq -r '.by // "unknown"' "$file")
          batches=$(jq '(.batches // []) | length' "$file")
          clicks=$(jq '[(.batches // [])[] | length] | add // 0' "$file")
          {
            echo "skip=false"
            echo "by=$by"
            echo "batches=$batches"
            echo "clicks=$clicks"
            echo "file=$file"
          } >> "$GITHUB_OUTPUT"

      - name: Send confirmation email (Resend)
        if: steps.sum.outputs.skip == 'false'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM || 'onboarding@resend.dev' }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          BY: ${{ steps.sum.outputs.by }}
          FILE: ${{ steps.sum.outputs.file }}
          BATCHES: ${{ steps.sum.outputs.batches }}
          CLICKS: ${{ steps.sum.outputs.clicks }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          subject="Archived: @${BY} — ${CLICKS} click(s)"
          body=$(printf 'Your tally data was archived to the repo.\n\nUser:    @%s\nFile:    %s\nBatches: %s\nClicks:  %s\nCommit:  %s\n\n— committer-proxy demo\n' \
            "$BY" "$FILE" "$BATCHES" "$CLICKS" "$COMMIT_URL")
          payload=$(jq -n \
            --arg from "$MAIL_FROM" --arg to "$NOTIFY_EMAIL" \
            --arg subject "$subject" --arg text "$body" \
            '{from: $from, to: [$to], subject: $subject, text: $text}')
          curl -fsS -X POST https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$payload"
