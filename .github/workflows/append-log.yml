name: Append timestamps to log

# Runs whenever most-recent-timestamps.json is committed (by the Worker on Save).
on:
  push:
    branches: [main]
    paths:
      - most-recent-timestamps.json

# Needed to push the updated log back to the repo.
permissions:
  contents: write

# Serialize runs so concurrent saves can't clash on the log file.
concurrency:
  group: timestamps-log
  cancel-in-progress: false

jobs:
  append:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append most-recent-timestamps.json as one JSONL line
        run: jq -c '.' most-recent-timestamps.json >> timestamps.json

      - name: Commit and push the log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add timestamps.json
          # --cached catches a brand-new (untracked) file, which plain `git diff` misses.
          if git diff --cached --quiet; then
            echo "No change to timestamps.json — nothing to commit."
            exit 0
          fi
          git commit -m "Append run to timestamps.json"
          git push
