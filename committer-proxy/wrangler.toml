name = "countdown"
main = "worker.js"
compatibility_date = "2024-11-01"

# Non-secret config — the single source of truth. Edit these for your repo.
# GITHUB_APP_ID and GITHUB_CLIENT_ID are the exception: setup.sh fills them in
# when it creates the App (you don't know them until then). Everything else you
# set yourself.
[vars]
REPO_OWNER = "bmottershead"
REPO_NAME = "bmottershead.github.io"
REPO_BRANCH = "main"
# Filled by setup.sh on App creation (both public, not secret).
GITHUB_APP_ID = "4155092"
GITHUB_CLIENT_ID = "Iv23li609lMVQIYXKRCl"
# Where to send the browser back after login (gets #session=... appended).
SITE_URL = "https://bmottershead.github.io"
# Comma-separated GitHub logins allowed to save. Empty = any user.
ALLOWED_LOGINS = "bmottershead"
# Browser origins allowed to call the Worker (CORS).
ALLOWED_ORIGINS = "https://bmottershead.github.io,http://localhost:8000"

# Shared-operator mode (docs/PLAN-shared.md). Leave UNSET for a normal
# single-repo self-hosted deploy. Set to "true" only on the operator's one
# Worker: then each signed-in user commits to their OWN repo (owner === login),
# under data/<login>/, and ALLOWED_LOGINS should be empty (any user).
# MULTI_TENANT = "true"

# Secrets (set with `wrangler secret put <NAME>`, do NOT put here):
#   GITHUB_APP_PRIVATE_KEY   App private key, PKCS#8 PEM   (already set)
#   GITHUB_CLIENT_SECRET     OAuth client secret of the App
#   SESSION_SECRET           random string for signing session JWTs
